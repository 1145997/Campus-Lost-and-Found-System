server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: campus-lost-found
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
    http:
      multipart:
        max-file-size: 50MB
        max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: dev.forint.campuslostfound.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-at-least-32-bytes}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  token-prefix: Bearer

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:campus-lost-found}
  read-path: ${MINIO_READ_PATH:http://localhost:9000/campus-lost-found}

logging:
  level:
    root: info
    dev.forint.campuslostfound: debug

wechat:
  miniapp:
    appid: ${WECHAT_MINIAPP_APPID:}
    secret: ${WECHAT_MINIAPP_SECRET:}
